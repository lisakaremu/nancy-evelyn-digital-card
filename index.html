<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nancy Evelyn Karemu | Digital Card</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<main class="page">

<section class="card">

<div class="card-left">

    <div class="hero">

    <h1>

        <span class="first-name">NANCY</span>

        <span class="middle-name">EVELYN</span>

        <span class="last-name">KAREMU</span>

    </h1>

    <p class="title">

        FOUNDING DIRECTOR

    </p>

</div>

<div class="brands">

    <div class="brand">
        <img src="assets/images/melkev-logo.png" alt="Melkev Fashions">
    </div>

    <div class="divider"></div>

    <div class="brand">
        <img src="assets/images/triedtrue-logo.png" alt="Tried & True Menswear">
    </div>

</div>

<div class="scan-section">

    <h3>Scan to Connect & Discover</h3>

    <img
        src="assets/qr/qr-code.png"
        alt="QR Code"
        class="qr-image">

</div>

<div class="tagline">

    <p>

        TWO BRANDS. ONE VISION. TIMELESS STYLE.

    </p>

</div>

</div>

<div class="card-right">
    <img
    src="assets/images/nancy.png"
    alt="Nancy Evelyn Karemu"
    class="nancy-image">

</div>

</section>

</main>

<script src="js/script.js"></script>

</body>

</html>
